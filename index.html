<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>БГ:воз Live</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-blur: blur(25px);
            --accent-yellow: #FFD700;
            --text-main: #FFFFFF;
            --font-ios: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-ios);
            color: var(--text-main);
            height: 100vh; width: 100vw; overflow: hidden;
            background: linear-gradient(-45deg, #050a14, #1a0505, #0a1428, #140514);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); }

        /* --- SCREEN MANAGEMENT --- */
        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s; 
            padding-bottom: 120px;
            visibility: hidden;
            opacity: 0;
        }

        #landing-page { z-index: 10; opacity: 1; visibility: visible; }
        #monitor-page, #plan-page { z-index: 20; transform: translateY(100%); }
        
        .active-up { transform: translateY(0) !important; visibility: visible !important; opacity: 1 !important; }
        .fade-out { opacity: 0; pointer-events: none; }

        /* --- LANDING --- */
        .top-section { margin-top: 8vh; text-align: center; flex-shrink: 0; }
        .modern-train-icon { width: 48px; height: 48px; margin-bottom: 10px; }
        h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em; text-transform: uppercase; }
        .center-section { width: 100%; padding: 30px 32px; display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
        .btn-large { width: 100%; padding: 22px; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; color: white; text-align: center; border-radius: 20px; cursor: pointer; transition: transform 0.1s; border: 1px solid var(--glass-border); background: var(--glass-bg); }
        .btn-large:active { transform: scale(0.96); }

        /* --- TITLES & SELECTS --- */
        .monitor-title-spacer { margin-top: 8vh; width: 100%; text-align: center; padding: 0 25px; margin-bottom: 20px; }
        .styled-select { width: 100%; padding: 18px; border-radius: 15px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; font-size: 1rem; outline: none; appearance: none; }

        /* --- PIDS MONITOR (AUTHENTIC LOOK) --- */
        .pids-display { width: calc(100% - 30px); background: #000; border-radius: 8px; border: 2px solid #333; padding: 12px 0; display: flex; flex-direction: column; margin: 0 15px; }
        .pids-header { display: grid; grid-template-columns: 70px 1fr 70px; padding: 0 15px 8px 15px; border-bottom: 1px solid #333; font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; }
        .pids-row { display: grid; grid-template-columns: 70px 1fr 70px; padding: 12px 15px; border-bottom: 1px solid #111; font-family: var(--font-mono); }
        .pids-voz { color: #FFF; font-size: 0.8rem; }
        .pids-smer { color: var(--accent-yellow); font-size: 1rem; text-align: center; font-weight: bold; }
        .pids-vreme { color: var(--accent-yellow); font-size: 1.1rem; text-align: right; font-weight: bold; }

        /* --- PLAN RESULTS --- */
        .results-container { width: calc(100% - 40px); flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .result-card { border-radius: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 15px; }
        .res-time { font-size: 1.5rem; font-weight: 800; color: var(--accent-yellow); font-family: var(--font-mono); }
        .res-dest { font-size: 1.2rem; font-weight: 700; color: #FFF; }

        /* --- NAV BAR --- */
        .nav-bar { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: calc(100% - 60px); max-width: 360px; height: 70px; display: flex; justify-content: space-around; align-items: center; border-radius: 35px; z-index: 9999; }
        .nav-item svg { width: 26px; height: 26px; fill: white; opacity: 0.4; transition: 0.3s; }
        .nav-item.active svg { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); }
    </style>
</head>
<body>

    <div id="landing-page" class="page">
        <header class="top-section">
            <svg class="modern-train-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="5" y="2" width="14" height="16" rx="3"/><line x1="5" y1="12" x2="19" y2="12"/><circle cx="9" cy="15" r="1" fill="white"/><circle cx="15" cy="15" r="1" fill="white"/></svg>
            <h1>БГ:воз</h1>
        </header>
        <main class="center-section">
            <div class="btn-large" onclick="openMonitor()">СТАНИЧНИ МОНИТОР</div>
            <div class="btn-large" onclick="openPlan()">ПЛАНИРАЈ ПУТОВАЊЕ</div>
        </main>
    </div>

    <div id="monitor-page" class="page glass">
        <div class="monitor-title-spacer"><h2>Монитор станице</h2></div>
        <div style="width: 100%; padding: 0 25px; margin-bottom: 25px;">
           <select id="station-picker" class="styled-select" onchange="fetchSrbijaVoz(this.value, this.options[this.selectedIndex].text)">
    <option value="" disabled selected>Изаберите станицу...</option>
    <optgroup label="Linija 1 (Batajnica - Ovča)">
        <option value="16204">Батајница (Batajnica)</option>
        <option value="01016">Камендин (Kamendin)</option>
        <option value="16001">Земун Поље (Zemun Polje)</option>
        <option value="01015">Алтина (Altina)</option>
        <option value="16002">Земун (Zemun)</option>
        <option value="16003">Тошин Бунар (Tosin Bunar)</option>
        <option value="16004">Нови Београд (Novi Beograd)</option>
        <option value="16052">Београд Центар (Prokop)</option>
        <option value="16006">Карађорђев Парк (Karadjordjev Park)</option>
        <option value="16007">Вуков Споменик (Vukov Spomenik)</option>
        <option value="16008">Панчевачки Мост (Pancevacki Most)</option>
        <option value="01001">Крњача Мост (Krnjaca Most)</option>
        <option value="16009">Крњача (Krnjaca)</option>
        <option value="16010">Себеш (Sebes)</option>
        <option value="16011">Овча (Ovca)</option>
    </optgroup>
    <optgroup label="Linija 2 (Resnik)">
        <option value="16005">Раковица (Rakovica)</option>
        <option value="16050">Кнежевац (Knezevac)</option>
        <option value="16051">Кијево (Kijevo)</option>
        <option value="16013">Ресник (Resnik)</option>
    </optgroup>
</select>
        </div>
        <div id="pids-container" class="pids-display">
            <div class="pids-header"><span>Voz</span><span>Smer</span><span>Vreme</span></div>
            <div id="pids-body">
                <div style="padding:20px; text-align:center; color:#444;">Изаберите стаnicu за приказ полазака</div>
            </div>
        </div>
    </div>

    <div id="plan-page" class="page glass">
        <div class="monitor-title-spacer"><h2>Планирај пут</h2></div>
        <div style="width: 100%; padding: 0 25px; margin-bottom: 25px;">
            <p style="text-align: center; opacity: 0.6; font-size: 0.9rem;">Приказ свих полазака са станице:</p>
            <select id="plan-station-picker" class="styled-select" onchange="fetchPlan(this.value, this.options[this.selectedIndex].text)">
                <option value="" disabled selected>Полазак из...</option>
                <option value="16007">Вуков Споменик</option>
                <option value="16052">Прокоп</option>
                <option value="16002">Земун</option>
                <option value="16204">Батајница</option>
            </select>
        </div>
        <div id="plan-results" class="results-container"></div>
    </div>

    <nav class="nav-bar glass">
        <div class="nav-item active" id="nav-home" onclick="handleNav('home')"><svg viewBox="0 0 24 24"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg></div>
        <div class="nav-item" id="nav-monitor" onclick="handleNav('monitor')"><svg viewBox="0 0 24 24"><path d="M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C6.47,22 2,17.5 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z"/></svg></div>
        <div class="nav-item" id="nav-plan" onclick="handleNav('plan')"><svg viewBox="0 0 24 24"><path d="M12,2C15.31,2 18,4.66 18,7.95C18,12.41 12,19 12,19C12,19 6,12.41 6,7.95C6,4.66 8.69,2 12,2M12,6A2,2 0 0,0 10,8A2,2 0 0,0 12,10A2,2 0 0,0 14,8A2,2 0 0,0 12,6Z"/></svg></div>
    </nav>

    <script>
    // Using the most stable proxy for Serbian RS domains
    const PROXY = "https://corsproxy.io/?";

    function handleNav(dest) {
        document.querySelectorAll('.page').forEach(p => { 
            p.classList.remove('active-up'); 
            p.classList.remove('fade-out'); 
        });
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        if(dest === 'home') {
            document.getElementById('landing-page').classList.add('active-up');
            document.getElementById('nav-home').classList.add('active');
        } else {
            document.getElementById(dest + '-page').classList.add('active-up');
            document.getElementById('landing-page').classList.add('fade-out');
            if(document.getElementById('nav-' + dest)) {
                document.getElementById('nav-' + dest).classList.add('active');
            }
        }
    }

    async function fetchSrbijaVoz(id, displayName) {
        const body = document.getElementById('pids-body');
        body.innerHTML = '<div style="padding:20px; text-align:center; color:var(--accent-yellow); font-family:monospace;">POVEZIVANJE...</div>';

        // 1. Extract the Latin name from brackets: "Батајница (Batajnica)" -> "BATAJNICA"
        let officialName = "";
        if (displayName.includes('(')) {
            officialName = displayName.split('(')[1].split(')')[0].trim().toUpperCase();
        } else {
            officialName = displayName.trim().toUpperCase();
        }
        
        // 2. Manual fix for the Center station
        if (officialName === "PROKOP" || officialName === "БЕОГРАД ЦЕНТАР") {
            officialName = "BEOGRAD CENTAR";
        }

        // 3. Precise Date Formatting
        const now = new Date();
        const d = String(now.getDate()).padStart(2, '0');
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const y = now.getFullYear();
        const dateStr = `${d}.${m}.${y}`;
        
        // 4. Construct the target URL
        const target = `https://w3.srbvoz.rs/redvoznje//stanicni/${encodeURIComponent(officialName)}/${id}/${dateStr}/0000/polazak/999/sr`;
        
        try {
            // We use a direct fetch with the corsproxy.io prefix
            const response = await fetch(PROXY + encodeURIComponent(target));
            
            if (!response.ok) throw new Error("Proxy error");

            const html = await response.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const rows = doc.querySelectorAll('tr.tsmall');
            
            body.innerHTML = "";
            
            if (!rows || rows.length === 0) {
                body.innerHTML = '<div style="padding:20px; text-align:center; opacity:0.5;">Trenutno nema polazaka.</div>';
                return;
            }

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 3) {
                    body.innerHTML += `
                        <div class="pids-row">
                            <span class="pids-voz">${cells[0].innerText.trim()}</span>
                            <span class="pids-smer">${cells[2].innerText.trim()}</span>
                            <span class="pids-vreme">${cells[1].innerText.trim()}</span>
                        </div>`;
                }
            });
        } catch (e) {
            console.error(e);
            body.innerHTML = `
                <div style="padding:20px; text-align:center;">
                    <div style="color:#ff4b4b; margin-bottom:10px;">Greška u komunikaciji sa serverom</div>
                    <button onclick="location.reload()" style="background:white; color:black; border:none; padding:8px 15px; border-radius:10px; font-size:0.8rem; font-weight:bold;">OSVEŽI</button>
                </div>`;
        }
    }

    function openMonitor() { handleNav('monitor'); }
    function openPlan() { handleNav('plan'); }
</script>
</body>
</html>
