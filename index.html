<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>БГ:воз Live</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-blur: blur(25px);
            --accent-yellow: #FFD700;
            --text-main: #FFFFFF;
            --font-ios: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-ios);
            color: var(--text-main);
            height: 100vh; width: 100vw; overflow: hidden;
            background: linear-gradient(-45deg, #050a14, #1a0505, #0a1428, #140514);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s; 
            padding-bottom: 120px;
            visibility: hidden;
            opacity: 0;
        }

        #landing-page { z-index: 10; opacity: 1; visibility: visible; }
        #monitor-page, #plan-page { z-index: 20; transform: translateY(100%); }
        
        .active-up { transform: translateY(0) !important; visibility: visible !important; opacity: 1 !important; }
        .fade-out { opacity: 0; pointer-events: none; }

        .top-section { margin-top: 8vh; text-align: center; flex-shrink: 0; }
        .modern-train-icon { width: 48px; height: 48px; margin-bottom: 10px; }
        h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em; text-transform: uppercase; }
        
        .center-section { width: 100%; padding: 30px 32px; display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
        .btn-large { width: 100%; padding: 22px; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; color: white; text-align: center; border-radius: 20px; cursor: pointer; transition: transform 0.1s; border: 1px solid var(--glass-border); background: var(--glass-bg); }
        .btn-large:active { transform: scale(0.96); }

        .monitor-title-spacer { margin-top: 8vh; width: 100%; text-align: center; padding: 0 25px; margin-bottom: 20px; }
        .styled-select { width: 100%; padding: 18px; border-radius: 15px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; font-size: 1rem; outline: none; appearance: none; margin-bottom: 10px; }

        .pids-display { width: calc(100% - 30px); background: #000; border-radius: 8px; border: 2px solid #333; padding: 12px 0; display: flex; flex-direction: column; margin: 0 15px; max-height: 50vh; overflow-y: auto; }
        .pids-header { display: grid; grid-template-columns: 70px 1fr 70px; padding: 0 15px 8px 15px; border-bottom: 1px solid #333; font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; }
        .pids-row { display: grid; grid-template-columns: 70px 1fr 70px; padding: 12px 15px; border-bottom: 1px solid #111; font-family: var(--font-mono); }
        .pids-voz { color: #888; font-size: 0.8rem; }
        .pids-smer { color: var(--accent-yellow); font-size: 1rem; font-weight: bold; }
        .pids-vreme { color: var(--accent-yellow); font-size: 1.1rem; text-align: right; font-weight: bold; }

        .results-container { width: calc(100% - 40px); flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .result-card { border-radius: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 18px; }
        .res-type { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .res-main { display: flex; justify-content: space-between; align-items: center; }
        .res-time { font-size: 1.4rem; font-weight: 800; color: var(--accent-yellow); font-family: var(--font-mono); }
        .res-info { text-align: right; }
        .res-dest { font-size: 1.1rem; font-weight: 700; color: #FFF; }
        .transfer-tag { background: #ff4b4b; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; }

        .nav-bar { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: calc(100% - 60px); max-width: 360px; height: 70px; display: flex; justify-content: space-around; align-items: center; border-radius: 35px; z-index: 9999; }
        .nav-item svg { width: 26px; height: 26px; fill: white; opacity: 0.4; transition: 0.3s; }
        .nav-item.active svg { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); }
    </style>
</head>
<body>

    <div id="landing-page" class="page">
        <header class="top-section">
            <svg class="modern-train-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="5" y="2" width="14" height="16" rx="3"/><line x1="5" y1="12" x2="19" y2="12"/><circle cx="9" cy="15" r="1" fill="white"/><circle cx="15" cy="15" r="1" fill="white"/></svg>
            <h1>БГ:воз Live</h1>
        </header>
        <main class="center-section">
            <div class="btn-large" onclick="openMonitor()">СТАНИЧНИ МОНИТОР</div>
            <div class="btn-large" onclick="openPlan()">ПЛАНИРАЈ ПУТОВАЊЕ</div>
        </main>
    </div>

    <div id="monitor-page" class="page glass">
        <div class="monitor-title-spacer"><h2>Монитор станице</h2></div>
        <div style="width: 100%; padding: 0 25px; margin-bottom: 25px;">
           <select id="station-picker" class="styled-select" onchange="updateMonitor(this.value)">
                <option value="" disabled selected>Изаберите станицу...</option>
             </select>
        </div>
        <div id="pids-container" class="pids-display">
            <div class="pids-header"><span>Voz</span><span>Smer</span><span>Vreme</span></div>
            <div id="pids-body"></div>
        </div>
    </div>

    <div id="plan-page" class="page glass">
        <div class="monitor-title-spacer"><h2>Планирај пут</h2></div>
        <div style="width: 100%; padding: 0 25px; margin-bottom: 20px;">
            <select id="plan-from" class="styled-select">
                <option value="" disabled selected>Полазак из...</option>
            </select>
            <select id="plan-to" class="styled-select">
                <option value="" disabled selected>До...</option>
            </select>
            <div class="btn-large" style="padding: 12px; margin-top: 5px; background: var(--accent-yellow); color: black;" onclick="findRoute()">ПРЕТРАЖИ</div>
        </div>
        <div id="plan-results" class="results-container"></div>
    </div>

    <nav class="nav-bar glass">
        <div class="nav-item active" id="nav-home" onclick="handleNav('home')"><svg viewBox="0 0 24 24"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg></div>
        <div class="nav-item" id="nav-monitor" onclick="handleNav('monitor')"><svg viewBox="0 0 24 24"><path d="M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C6.47,22 2,17.5 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z"/></svg></div>
        <div class="nav-item" id="nav-plan" onclick="handleNav('plan')"><svg viewBox="0 0 24 24"><path d="M12,2C15.31,2 18,4.66 18,7.95C18,12.41 12,19 12,19C12,19 6,12.41 6,7.95C6,4.66 8.69,2 12,2M12,6A2,2 0 0,0 10,8A2,2 0 0,0 12,10A2,2 0 0,0 14,8A2,2 0 0,0 12,6Z"/></svg></div>
    </nav>

    <script>
        let trainData = [];

// Helper to clean "(dep)" and "(arr)" from Latin strings
function cleanStationName(name) {
    if (!name) return "";
    return name.replace("(dep)", "").replace("(arr)", "").trim();
}

async function loadData() {
    try {
        const resp = await fetch('trains.json?v=' + new Date().getTime());
        trainData = await resp.json();
        populateStationLists();
        console.log("Data loaded and lists populated");
    } catch (e) {
        console.error("Failed to load trains.json", e);
    }
}

function populateStationLists() {
    let allStations = new Set();
    trainData.forEach(train => {
        train.stops.forEach(s => {
            allStations.add(cleanStationName(s.station));
        });
    });

    const sortedStations = Array.from(allStations).sort();
    const picker = document.getElementById('station-picker');
    const from = document.getElementById('plan-from');
    const to = document.getElementById('plan-to');

    // Reset selects
    const monitorDefault = '<option value="" disabled selected>Select Station...</option>';
    const planFromDefault = '<option value="" disabled selected>From...</option>';
    const planToDefault = '<option value="" disabled selected>To...</option>';

    picker.innerHTML = monitorDefault;
    from.innerHTML = planFromDefault;
    to.innerHTML = planToDefault;

    sortedStations.forEach(name => {
        const opt = `<option value="${name}">${name}</option>`;
        picker.innerHTML += opt;
        from.innerHTML += opt;
        to.innerHTML += opt;
    });
}

function updateMonitor(selectedStation) {
    const body = document.getElementById('pids-body');
    const now = new Date();
    const currentTime = now.getHours() * 60 + now.getMinutes();
    let directions = {};

    trainData.forEach(train => {
        // Match by cleaning the JSON name to compare with cleaned dropdown name
        const stop = train.stops.find(s => cleanStationName(s.station) === selectedStation);
        
        if (stop) {
            const [h, m] = stop.departure.split(':').map(Number);
            const depMins = h * 60 + m;
            const rawDest = train.stops[train.stops.length - 1].station;
            const cleanDest = cleanStationName(rawDest);

            if (depMins >= currentTime) {
                if (!directions[cleanDest] || depMins < directions[cleanDest].mins) {
                    directions[cleanDest] = {
                        id: train.train_id,
                        time: stop.departure,
                        mins: depMins,
                        dest: cleanDest
                    };
                }
            }
        }
    });

    const displayList = Object.values(directions).sort((a, b) => a.mins - b.mins);
    body.innerHTML = displayList.map(d => `
        <div class="pids-row">
            <span class="pids-voz">${d.id}</span>
            <span class="pids-smer">${d.dest}</span>
            <span class="pids-vreme">${d.time}</span>
        </div>
    `).join('') || '<div style="padding:20px; text-align:center; opacity:0.5;">No departures.</div>';
}

function findRoute() {
    const start = document.getElementById('plan-from').value;
    const end = document.getElementById('plan-to').value;
    const container = document.getElementById('plan-results');
    if(!start || !end) return;

    let results = [];

    trainData.forEach(train => {
        const startIndex = train.stops.findIndex(s => cleanStationName(s.station) === start);
        const endIndex = train.stops.findIndex(s => cleanStationName(s.station) === end);
        
        if (startIndex !== -1 && endIndex !== -1 && endIndex > startIndex) {
            results.push({
                type: "DIRECT",
                train1: train.train_id,
                depTime: train.stops[startIndex].departure,
                arrTime: train.stops[endIndex].arrival,
                depMins: timeToMins(train.stops[startIndex].departure)
            });
        }
    });

    results.sort((a, b) => a.depMins - b.depMins);
    container.innerHTML = results.map(r => `
        <div class="result-card">
            <div class="res-type">Direct Train</div>
            <div class="res-main">
                <div class="res-time">${r.depTime} ➔ ${r.arrTime}</div>
                <div class="res-info">
                    <div class="res-dest">Train ${r.train1}</div>
                </div>
            </div>
        </div>
    `).join('') || '<div style="padding:20px; text-align:center; opacity:0.5;">No routes found.</div>';
}

function timeToMins(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
}

function handleNav(dest) {
    document.querySelectorAll('.page').forEach(p => { 
        p.classList.remove('active-up'); 
        p.classList.remove('fade-out'); 
    });
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    if(dest === 'home') {
        document.getElementById('landing-page').classList.add('active-up');
        document.getElementById('nav-home').classList.add('active');
    } else {
        const page = document.getElementById(dest + '-page');
        if(page) page.classList.add('active-up');
        document.getElementById('landing-page').classList.add('fade-out');
        const nav = document.getElementById('nav-' + dest);
        if(nav) nav.classList.add('active');
    }
}

function openMonitor() { handleNav('monitor'); }
function openPlan() { handleNav('plan'); }

window.onload = loadData;

</script>
</body>
</html>
