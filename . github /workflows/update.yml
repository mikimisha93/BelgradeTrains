name: Refresh Train Data

on:
  push:                # This triggers it the moment you click 'Save'
    branches: [ main ]
  workflow_dispatch:   # This creates the manual button
  schedule:
    - cron: '0 3 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tools
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Save Changes to GitHub
        run: |
          git config --global user.name "TrainDataBot"
          git config --global user.email "bot@github.com"
          git add trains.json
          git commit -m "Manual update via Push" || exit 0
          git push
          
