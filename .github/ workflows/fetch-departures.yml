name: Fetch BG:VOZ Departures

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-departures:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch cheerio

      - name: Run scraper
        run: node scripts/fetch-departures.js

      - name: Commit and push departures.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/departures.json
          git diff --cached --quiet || git commit -m "chore: update departures.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
